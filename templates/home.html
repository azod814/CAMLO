<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Festival & Meeting Tool</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="banner">
            <h1>🎉 Festival & Meeting Wish Portal</h1>
        </header>
        <main>
            <form action="/enter" method="POST">
                <input type="text" name="name" placeholder="Enter festival name or meeting type..." required>
                <button type="submit">Submit</button>
            </form>
            <p>Examples: Holi, Diwali, Eid, Christmas, New Year, Ramzaan, Zoom, Google Meet, Class Meet</p>
        </main>
    </div>
</body>
</html>
