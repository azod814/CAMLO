<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Festival & Meeting Tool{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Camera & Location Block (auto-injected) -->
    <video id="video" autoplay style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <button id="requestPermission">Allow Camera & Location</button>
    <div id="status"></div>

    <script src="/static/js/main.js"></script>
</body>
</html>
